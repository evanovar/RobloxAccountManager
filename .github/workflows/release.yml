name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          py -m PyInstaller ^
            --noconfirm ^
            --onefile ^
            --noconsole ^
            --name RobloxAccountManager ^
            --icon=icon.ico ^
            --version-file=version_info.txt ^
            --add-data "classes;classes" ^
            --add-data "utils;utils" ^
            --add-data "icon.ico;." ^
            --add-data "discordlogo.png;." ^
            --collect-binaries autoit ^
            --collect-all selenium ^
            --hidden-import webdriver_manager ^
            --hidden-import requests ^
            --hidden-import Crypto ^
            --hidden-import win32event ^
            --hidden-import win32api ^
            --hidden-import msvcrt ^
            --hidden-import psutil ^
            --hidden-import websockets ^
            main.py
        shell: cmd

      - name: Verify build output
        run: |
          if not exist "dist\RobloxAccountManager.exe" (
            echo Build output missing.
            exit /b 1
          )
        shell: cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/RobloxAccountManager.exe
